<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуальная новелла</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Панель управления -->
    <div class="control-panel">
        <!-- Управление музыкой -->
        <button id="soundToggle" class="control-btn sound-on" title="Звук вкл/выкл">
            <!-- SVG или img -->
            <img src="https://raw.githubusercontent.com/illager10/poetry/refs/heads/main/images/music_on_icon.png" alt="🔊">
        </button>
        <button id="settingsBtn" class="control-btn" title="Меню">
            <img src="https://raw.githubusercontent.com/illager10/poetry/refs/heads/main/images/settings_icon.png" alt="☰">
        </button>
    </div>
    <div id="settingsModal" class="settings-modal hidden">
        <div class="settings-overlay"></div>
        <div class="settings-panel">
            <div class="settings-header">
                <h2>⚙️ Настройки</h2>
                <button id="closeSettings" class="close-btn">×</button>
            </div>
            
            <div class="setting-item">
                <label>Музыка</label>
                <!-- <label class="toggle-switch">
                    <input type="checkbox" id="soundToggle" checked>
                    <span class="slider"></span>
                </label> -->
                <button id="SettingSoundToggle" class="control-btn sound-on" title="Звук вкл/выкл">
                    <img src="https://raw.githubusercontent.com/illager10/poetry/refs/heads/main/images/music_on_icon.png" alt="🔊">
                </button>
            </div>
            
            <div class="setting-item">
                <label>Громкость</label>
                <div class="volume-control">
                    <input type="range" id="volumeSlider" min="0" max="100" value="30">
                    <span id="volumeValue">30%</span>
                </div>
            </div>
            
            <button class="save-btn">Сохранить</button>
        </div>
    </div>
    <div class="novel-container">
        <!-- Меню сцен (по умолчанию) -->
        <div id="sceneMenu">
            <h1>Выберите сцену</h1>
            <div class="scene-grid">
                <button class="scene-btn" data-scene="1">🌙 Ночной особняк</button>
                <button class="scene-btn" data-scene="2">🌧️ Дождливый лес</button>
                <button class="scene-btn" data-scene="3">🏰 Заброшенный замок</button>
            </div>
        </div>

        <!-- Сцены (скрыты) -->
        <div id="scene1" class="scene hidden">
            <h1>Сцена 1: Ночной особняк</h1>
            <p>Ты стоишь перед тёмным особняком. Луна освещает его острые шпили...</p>
            <button class="back-btn">← Назад к меню</button>
        </div>

        <div id="scene2" class="scene hidden">
            <h1>Сцена 2: Дождливый лес</h1>
            <p>Дождь хлещет по листьям. Вдали слышен вой волков...</p>
            <button class="back-btn">← Назад к меню</button>
        </div>

        <div id="scene3" class="scene hidden">
            <h1>Сцена 3: Заброшенный замок</h1>
            <p>Ветер завывает в пустых коридорах. Что-то шевелится в тени...</p>
            <button class="back-btn">← Назад к меню</button>
        </div>
    </div>
    <div class="fade-overlay" id="fadeOverlay"></div>
    <!-- Музыка сцен -->
    <div id="audioContainer" style="display: none;">
    <audio id="audio-menu" preload="auto" loop>
        <source src="https://raw.githubusercontent.com/illager10/poetry/refs/heads/main/music/menu.m4a" type="audio/mpeg">
    </audio>
    <audio id="audio-scene1" preload="auto" loop>
        <source src="https://raw.githubusercontent.com/illager10/poetry/refs/heads/main/music/scene1.m4a" type="audio/mpeg">
    </audio>
    <audio id="audio-scene2" preload="auto" loop>
        <source src="https://raw.githubusercontent.com/illager10/poetry/refs/heads/main/music/scene1.m4a" type="audio/mpeg">
    </audio>
    <audio id="audio-scene3" preload="auto" loop>
        <source src="https://raw.githubusercontent.com/illager10/poetry/refs/heads/main/music/scene1.m4a" type="audio/mpeg">
    </audio>
</div>
    <script src="script.js"></script>
</body>
</html>
